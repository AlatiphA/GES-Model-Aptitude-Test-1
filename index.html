<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>
    AlatiphA EPUB Reader
  </title>

  <link
    rel="manifest"
    href="./manifest.json"
  />

  <link
    rel="stylesheet"
    href="./style.css"
  />

  <meta
    name="theme-color"
    content="#111111"
  />

</head>

<body>

<div class="app">

  <header>

    <button
      id="menuBtn"
      class="iconBtn"
      aria-label="Open Menu"
    >
      ☰
    </button>

    <h1 class="title">
      GES Promotion Aptitude Test Pasco
    </h1>

    <button
      id="themeBtn"
      class="iconBtn"
      aria-label="Toggle Theme"
    >
      🌙
    </button>

  </header>

  <aside
    id="sidebar"
    class="sidebar"
  >

    <div class="controls">

      <button id="decreaseFont">
        A-
      </button>

      <button id="increaseFont">
        A+
      </button>

    </div>

    <div id="toc"></div>

  </aside>

  <main>

  <div id="viewer"></div>

  <div id="navOverlay">

    <div
      id="leftZone"
      class="navZone"
    ></div>

    <div
      id="centerZone"
      class="navZone"
    ></div>

    <div
      id="rightZone"
      class="navZone"
    ></div>

  </div>

  </main>

  <footer>

  <div class="topFooter">

    <button
      id="prevPage"
      class="navBtn"
      aria-label="Previous Page"
    >
      ◀
    </button>

    <span id="progressText">
      0%
    </span>

    <button
      id="nextPage"
      class="navBtn"
      aria-label="Next Page"
    >
      ▶
    </button>

  </div>

  <div class="bottomFooter">

    <button
      id="bottomThemeBtn"
      class="bottomBtn"
    >
      Theme
    </button>

    <button
      id="bottomDecreaseFont"
      class="bottomBtn"
    >
      A-
    </button>

    <button
      id="bottomMenuBtn"
      class="bottomBtn"
    >
      Chapters
    </button>

    <button
      id="bottomIncreaseFont"
      class="bottomBtn"
    >
      A+
    </button>

    <button
      id="closeAppBtn"
      class="bottomBtn"
    >
      Close
    </button>

  </div>

</footer>

</div>

<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/epubjs/dist/epub.min.js"></script>

<script src="./app.js"></script>

</body>
</html>
